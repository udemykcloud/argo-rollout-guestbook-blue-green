apiVersion: argoproj.io/v1alpha1
   kind: Rollout
   metadata:
     name: guestbook-ui
     namespace: default
   spec:
     replicas: 3
     revisionHistoryLimit: 2
     selector:
       matchLabels:
         app: guestbook-ui
     template:
       metadata:
         labels:
           app: guestbook-ui
       spec:
         containers:
           - name: guestbook-ui
             image: udemykcloud534/guestbook:green
             ports:
               - containerPort: 80
             readinessProbe:
               httpGet:
                 path: /
                 port: 80
               initialDelaySeconds: 5
               periodSeconds: 10
   strategy:
     canary:
       steps:
         - setWeight: 20
         - pause: {}
         - setWeight: 50
         - pause: {}
         - setWeight: 100
       canaryService: guestbook-ui-canary
       stableService: guestbook-ui
       trafficRouting:
         nginx:
           stableIngress: guestbook-ui-ingress
   ---
   apiVersion: v1
   kind: Service
   metadata:
     name: guestbook-ui
     namespace: default
   spec:
     ports:
       - port: 80
         targetPort: 80
     selector:
       app: guestbook-ui
   ---
   apiVersion: v1
   kind: Service
   metadata:
     name: guestbook-ui-canary
     namespace: default
   spec:
     ports:
       - port: 80
         targetPort: 80
     selector:
       app: guestbook-ui
   ---
   apiVersion: networking.k8s.io/v1
   kind: Ingress
   metadata:
     name: guestbook-ui-ingress
     namespace: default
     annotations:
       nginx.ingress.kubernetes.io/canary: "false"
       kubernetes.io/ingress.class: "nginx"
   spec:
     ingressClassName: nginx
     rules:
       - http:
           paths:
             - path: /
               pathType: Prefix
               backend:
                 service:
                   name: guestbook-ui
                   port:
                     number: 80
